# Netlify deployment configuration (alternative to GitHub Pages)
# This allows deploying to Netlify if needed

[build]
  command = "cd docs && bundle install && bundle exec jekyll build"
  publish = "docs/_site"
  functions = "netlify/functions"

[build.environment]
  JEKYLL_ENV = "production"
  RUBY_VERSION = "4.0.6"

# Redirects and rewrites
[[redirects]]
  from = "/about"
  to = "/about/"
  status = 301
  force = true

[[redirects]]
  from = "/listen"
  to = "/listen/"
  status = 301
  force = true

[[redirects]]
  from = "/watch"
  to = "/watch/"
  status = 301
  force = true

# Custom headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache rules
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/feed.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
