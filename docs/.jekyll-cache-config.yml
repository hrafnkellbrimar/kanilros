# Jekyll build performance optimizations
# Place in docs directory for faster builds

# Exclude large directories from processing
exclude:
  - vendor/
  - .bundle/
  - node_modules/
  - .git/
  - .github/

# Incremental build for faster rebuilds during development
incremental: true

# Parallel processing for faster builds
profile: true

# SASS configuration
sass:
  load_paths:
    - _sass
  style: compressed

# Liquid template engine performance
strict_variables: false
strict_filters: false

# Markdown processor configuration
markdown: kramdown
kramdown:
  input: GFM
  parse_block_html: true
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    disable: true
