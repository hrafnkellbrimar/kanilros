---
layout: default
---
<article class="shell page">
  <header class="page__header">
    <p class="eyebrow">Release</p>
    <h1>{{ page.title | escape }}</h1>
    <p class="page__meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%e %B %Y" }}</time>
    </p>
  </header>
  <div class="prose">
    {{ content }}
  </div>
</article>
