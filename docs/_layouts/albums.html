---
layout: page
---

<div class="albums">
  {% for album in site.data.albums.albums %}
    <article class="album" id="album-{{ album.id }}">
      <h2>{{ album.title }}</h2>
      <p class="album-date">Released {{ album.releaseDate }}</p>
      <div class="album-description">{{ album.description }}</div>
      
      <div class="album-players">
        <div class="soundcloud-player" role="region" aria-label="SoundCloud player for {{ album.title }}">
          <iframe 
            title="SoundCloud player - {{ album.title }}"
            width="100%" 
            height="450" 
            scrolling="no" 
            frameborder="0" 
            allow="autoplay" 
            loading="lazy"
            src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/playlists/{{ album.soundcloud_playlist }}&color=%23ff5500&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true">
          </iframe>
        </div>
      </div>
    </article>
  {% endfor %}
</div>
