<!-- Meta tags for Open Graph (social sharing) -->
<meta property="og:site_name" content="{{ site.title }}" />
<meta property="og:title" content="{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}" />
<meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description | strip_html | strip_newlines | truncate: 160 }}{% endif %}" />
<meta property="og:type" content="website" />
<meta property="og:url" content="{{ page.url | absolute_url }}" />
<meta property="og:image" content="{{ site.url }}/assets/og-image.png" />

<!-- Twitter Card meta tags -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:site" content="@{{ site.twitter_username }}" />
<meta name="twitter:title" content="{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}" />
<meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description | strip_html | strip_newlines | truncate: 160 }}{% endif %}" />
<meta name="twitter:image" content="{{ site.url }}/assets/og-image.png" />

<!-- Additional meta tags -->
<meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description | strip_html | strip_newlines | truncate: 160 }}{% endif %}" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="light dark" />

<!-- Canonical URL -->
<link rel="canonical" href="{{ page.url | absolute_url }}" />
