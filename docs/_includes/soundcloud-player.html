<div class="embed embed--soundcloud">
  <iframe
    title="Listen to {{ include.title | escape }} on SoundCloud"
    loading="lazy"
    allow="autoplay"
    referrerpolicy="strict-origin-when-cross-origin"
    src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/playlists/{{ include.playlist_id }}&color=%23a94f3f&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=true">
  </iframe>
</div>
