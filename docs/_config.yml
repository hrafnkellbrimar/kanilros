# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, restart the server.

# ============================================
# Site Settings
# ============================================
domain: kanilros.is
title: Kanilrós
tagline: Independent Icelandic rock from Reykjanesbær
email: kanilros@kanilros.is
lang: en-IS
author:
  name: Hrafnkell Brimar Hallmundsson
  url: https://kanilros.is/about/
description: >-
  Kanilrós is the independent music project of Icelandic guitarist, songwriter,
  singer, multi-instrumentalist, and producer Hrafnkell Brimar Hallmundsson.
image: https://is1-ssl.mzstatic.com/image/thumb/Music221/v4/aa/34/2b/aa342be4-0577-00e8-253b-3abeb62d3d54/artwork.jpg/1000x1000bb.jpg
logo: /assets/favicon.svg

baseurl: ""
url: https://kanilros.is

# Social media accounts
twitter_username: kanilros
instagram_username: kanilros
facebook_username: kanilros

social:
  name: Kanilrós
  links:
    - https://open.spotify.com/artist/1uXctS0gcqInSzZyKTGLK2
    - https://youtube.com/@kanilros
    - https://soundcloud.com/kanilros
    - https://instagram.com/kanilros
    - https://x.com/kanilros
    - https://bsky.app/profile/kanilros.is
    - https://facebook.com/kanilros
    - https://music.apple.com/is/artist/kanilr%C3%B3s/1682781331

# ============================================
# Build Settings
# ============================================
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# ============================================
# Markdown Processing
# ============================================
markdown: kramdown
kramdown:
  parse_block_html: true
  input: GFM

# ============================================
# Site Output
# ============================================
permalink: /:categories/:title/
timezone: Atlantic/Reykjavik

# ============================================
# SEO and Metadata
# ============================================
twitter:
  username: kanilros
  card: summary_large_image

# ============================================
# Build Performance
# ============================================
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - vendor/
