# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, restart the server.

# ============================================
# Site Settings
# ============================================
domain: kanilros.is
title: Kanilrós
email: hrafnkellkanilros@gmail.com
description: >-
  Welcome to the home of musician Kanilrós. Explore instrumental and rock music
  featuring the electric guitar, mandolins, and digital instruments.

baseurl: /
url: https://kanilros.is

# Social media accounts
twitter_username: kanilros
instagram_username: kanilros
facebook_username: kanilros

# ============================================
# Build Settings
# ============================================
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-remote-theme

# ============================================
# Markdown Processing
# ============================================
markdown: kramdown
kramdown:
  parse_block_html: true
  input: GFM

# ============================================
# Site Output
# ============================================
permalink: /:categories/:title/
timezone: UTC

# ============================================
# SEO and Metadata
# ============================================
google_site_verification: ""
msvalidate: ""

# ============================================
# Build Performance
# ============================================
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/

include:
  - .htaccess
  - _redirects
