# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, restart the server.

# ============================================
# Site Settings
# ============================================
domain: kanilros.is
title: Kanilrós
email: hrafnkellkanilros@gmail.com
lang: en
author:
  name: Hrafnkell Brimar
  url: https://kanilros.is/about/
description: >-
  Icelandic underground music shaped by electric guitar, mandolins, vocals,
  and digital instruments.

baseurl: ""
url: https://kanilros.is

# Social media accounts
twitter_username: kanilros
instagram_username: kanilros
facebook_username: kanilros

# ============================================
# Build Settings
# ============================================
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# ============================================
# Markdown Processing
# ============================================
markdown: kramdown
kramdown:
  parse_block_html: true
  input: GFM

# ============================================
# Site Output
# ============================================
permalink: /:categories/:title/
timezone: UTC

# ============================================
# SEO and Metadata
# ============================================
twitter:
  username: kanilros
  card: summary

# ============================================
# Build Performance
# ============================================
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - vendor/
